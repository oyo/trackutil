packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  '@esbuild-plugins/node-globals-polyfill': ^0.2.3
  '@nodable/flexible-xml-parser': ^1.7.0
  '@types/leaflet': ^1.9.21
  '@types/node': ^24
  drop.that: ^0.0.7
  leaflet: ^1.9.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vite-plugin-node-polyfills: ^0.28.0
  vite-plus: 0.2.2
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
allowBuilds:
  esbuild: true
minimumReleaseAgeExclude:
  - drop.that@0.1.1
